name: Deploy Telegram Bot

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o tgbot-bot .

      - name: Deploy to VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          KEY: ${{ secrets.VPS_SSH_KEY }}
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          set -x
          echo "$KEY" > /tmp/key && chmod 600 /tmp/key

          # Создаём папку
          ssh -o StrictHostKeyChecking=no -i /tmp/key root@${HOST} "mkdir -p /home/gotgbot"

          # Копируем бинарник
          cat tgbot-bot | ssh -o StrictHostKeyChecking=no -i /tmp/key root@${HOST} "cat > /home/gotgbot/tgbot-bot"

          # Создаём .env c токеном
          ssh -o StrictHostKeyChecking=no -i /tmp/key root@${HOST} "echo 'TELEGRAM_TOKEN=${TOKEN}' > /home/gotgbot/.env"

          # Делаем исполняемым и запускаем через Docker
          ssh -o StrictHostKeyChecking=no -i /tmp/key root@${HOST} "chmod +x /home/gotgbot/tgbot-bot && cd /home/gotgbot && docker compose down && docker compose up -d"

          rm -f /tmp/key